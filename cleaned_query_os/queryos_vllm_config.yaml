# QueryOS config for a multi-copy OpenAI-compatible vLLM deployment.
#
# Example server shape:
#   base_url: http://localhost:8000/v1
#   model: the served model name exposed by vLLM
#
# QueryOS uses OpenAI tool/function calling heavily. Your vLLM deployment must
# support tool calls for the chosen model/template, otherwise Planner/SDA/SWA/SVA
# cannot reliably operate.

provider: vllm

# Single-endpoint fallback. Used if llm_router.endpoints is empty/unavailable.
base_url: http://localhost:8000/v1
api_key: EMPTY

# Must match your vLLM --served-model-name, or the model id exposed by /v1/models.
model: Qwen/Qwen3-Coder-Next
temperature: 0.2
llm_timeout_seconds: 180

llm_router:
  enabled: true
  # least_inflight is the best default when multiple copies have similar capacity.
  # Other options: round_robin, random.
  strategy: least_inflight
  request_timeout_seconds: 180
  max_retries: 3
  cooldown_seconds: 15

  # Three nodes, two vLLM copies per node.
  endpoints:
    - name: local-8000
      base_url: http://localhost:8000/v1
      api_key: EMPTY
      model: Qwen/Qwen3-Coder-Next
      weight: 1
      max_inflight: 16
    - name: local-8001
      base_url: http://localhost:8001/v1
      api_key: EMPTY
      model: Qwen/Qwen3-Coder-Next
      weight: 1
      max_inflight: 16
    - name: node-4-186-8000
      base_url: http://172.31.4.186:8000/v1
      api_key: EMPTY
      model: Qwen/Qwen3-Coder-Next
      weight: 1
      max_inflight: 16
    - name: node-4-186-8001
      base_url: http://172.31.4.186:8001/v1
      api_key: EMPTY
      model: Qwen/Qwen3-Coder-Next
      weight: 1
      max_inflight: 16
    - name: node-14-215-8000
      base_url: http://172.31.14.215:8000/v1
      api_key: EMPTY
      model: Qwen/Qwen3-Coder-Next
      weight: 1
      max_inflight: 16
    - name: node-14-215-8001
      base_url: http://172.31.14.215:8001/v1
      api_key: EMPTY
      model: Qwen/Qwen3-Coder-Next
      weight: 1
      max_inflight: 16

  # Optional role-specific pools. If omitted, every role can use every endpoint.
  role_pools:
    planner:
      strategy: least_inflight
      endpoints: [local-8000, local-8001, node-4-186-8000, node-4-186-8001, node-14-215-8000, node-14-215-8001]
    schema_discovery:
      strategy: least_inflight
      endpoints: [local-8000, local-8001, node-4-186-8000, node-4-186-8001, node-14-215-8000, node-14-215-8001]
    sql_writer:
      strategy: least_inflight
      endpoints: [local-8000, local-8001, node-4-186-8000, node-4-186-8001, node-14-215-8000, node-14-215-8001]
    sql_validator:
      strategy: least_inflight
      endpoints: [local-8000, local-8001, node-4-186-8000, node-4-186-8001, node-14-215-8000, node-14-215-8001]
    reason_summarizer:
      strategy: least_inflight
      endpoints: [local-8000, local-8001, node-4-186-8000, node-4-186-8001, node-14-215-8000, node-14-215-8001]

models:
  # Leave blank/null to inherit `model`, or route roles to different served names.
  planner:
  schema_discovery:
  sql_writer:
  sql_validator:
  # Used by dev_20240627/build_failure_memory.py for mismatch summaries.
  reason_summarizer:

workflow:
  max_steps: 30
  validation: auto
  auto_finish_on_sql: false

planner:
  context: dispatch
  max_tokens: 8192

schema_discovery:
  max_tokens: 16384
  max_turns: 24
  max_tool_calls_per_turn: 12
  parallel_workers: 4
  # Whole parallel SDA group watchdog. 0 disables the group watchdog.
  parallel_timeout_seconds: 240
  read_table_summary_max_cols: 0
  trace_column_preview_limit: 0

sql_writer:
  max_tokens: 16384
  max_turns: 24
  parallel_workers: 4
  # Whole initial SQL writer group watchdog. Completed workers keep going.
  parallel_timeout_seconds: 240
  consensus:
    require_same_columns: false
  chatgroup:
    enabled: true
    max_rounds: 4

sql_validator:
  max_tokens: 8192

trace:
  live: true
  style: pretty
  color: auto
  max_chars: 0
  sql_preview_rows: 20
  gold_preview_rows: 20
  result_cell_max_width: 96
  state_view: full
